root = "."
tmp_dir = "tmp"

[build]
  cmd = "CGO_ENABLED=0 go build -o ./tmp/kith-pms ./cmd"
  bin = "tmp/kith-pms serve"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["web", "dist", "data", "bin", "tmp", ".git", "node_modules", "internal/api/spa/public"]
  exclude_file = []
  exclude_regex = [".*_test.go"]
  exclude_unchanged = true
  log = "build-errors.log"
  stop_on_error = false
  send_interrupt = true
  kill_delay = "500ms"
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
