#:schema https://json.schemastore.org/any.json

root = "."
tmp_dir = "tmp"

[build]
cmd = "CGO_ENABLED=0 go build -o ./tmp/kith-pms ./cmd"
full_bin = "./tmp/kith-pms serve"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["web", "dist", "data", "bin", "tmp", ".git", "node_modules", "internal/api/spa/public", "docs", "plans"]
exclude_file = []
exclude_regex = ["_test\\.go"]
exclude_unchanged = true
follow_symlink = false
log = "build-errors.log"
poll = false
poll_interval = 500
delay = 1000 # ms
stop_on_error = false
send_interrupt = true
kill_delay = 500000000 # nanoseconds (= 500ms)
rerun = false
rerun_delay = 500

[log]
time = false
main_only = false
silent = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true
