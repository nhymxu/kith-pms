version: 2

before:
  hooks:
    - make web

builds:
  - id: kith-pms
    main: ./cmd
    binary: kith-pms
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version=nightly -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: kith-pms
    name_template: "{{ .ProjectName }}_nightly_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

dockers:
  - use: buildx
    ids:
      - kith-pms
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/nhymxu/kith-pms:nightly-amd64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version=nightly"

  - use: buildx
    ids:
      - kith-pms
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/nhymxu/kith-pms:nightly-arm64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64/v8"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version=nightly"

  - use: buildx
    ids:
      - kith-pms
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser-debian-slim
    image_templates:
      - "ghcr.io/nhymxu/kith-pms:nightly-slim-amd64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version=nightly"

  - use: buildx
    ids:
      - kith-pms
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser-debian-slim
    image_templates:
      - "ghcr.io/nhymxu/kith-pms:nightly-slim-arm64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64/v8"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version=nightly"

docker_manifests:
  - name_template: "ghcr.io/nhymxu/kith-pms:nightly"
    image_templates:
      - "ghcr.io/nhymxu/kith-pms:nightly-amd64"
      - "ghcr.io/nhymxu/kith-pms:nightly-arm64"
  - name_template: "ghcr.io/nhymxu/kith-pms:nightly-slim"
    image_templates:
      - "ghcr.io/nhymxu/kith-pms:nightly-slim-amd64"
      - "ghcr.io/nhymxu/kith-pms:nightly-slim-arm64"

changelog:
  disable: true

release:
  prerelease: true
  name_template: "Nightly Build"
  header: |
    ## Nightly Build

    > **Warning**: This is an automated nightly build from the main branch.
    > It may contain bugs and breaking changes. Use at your own risk.
    > For stable releases, please use a versioned release.

    Built from commit: {{ .ShortCommit }}
