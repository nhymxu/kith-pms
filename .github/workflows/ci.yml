name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-ci:
    name: Go lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Download modules
        run: make deps

      - name: Check formatting
        run: make check-fmt

      - name: Lint
        run: make lint

      - name: Test
        run: make tests

      - name: Vulnerability check
        run: make vuln-check

  web-ci:
    name: Web lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: "11"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Biome check
        run: pnpm --dir web biome check

      - name: TypeScript check
        run: pnpm --dir web tsc --noEmit

      - name: Build
        run: pnpm --dir web build
