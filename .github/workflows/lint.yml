name: Lint + test

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - '.github/**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-lint:
    name: Go lint + test
    # Skip push triggered by a PR merge — the pull_request event already ran this
    if: ${{ !(github.event_name == 'push' && startsWith(github.event.head_commit.message, 'Merge pull request')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

      - name: Test
        run: make tests

      - name: Vulnerability check
        run: make vuln-check

  web-lint:
    name: Web lint + build
    # Skip push triggered by a PR merge — the pull_request event already ran this
    if: ${{ !(github.event_name == 'push' && startsWith(github.event.head_commit.message, 'Merge pull request')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: "11"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Biome CLI
        uses: biomejs/setup-biome@v2

      - name: Run Biome
        run: biome ci

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build
