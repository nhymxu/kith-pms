name: Nightly build

on:
  # push:
  #   branches:
  #     - main
  #   paths-ignore:
  #     - '**.md'
  #     - '.github/**'
  #     - '!.github/workflows/nightly-build.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  nightly-build:
    name: GoReleaser-nightly
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: "11"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile --dir web

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> 2"
          args: release --snapshot --parallelism 1 --clean --config .github/.goreleaser-nightly.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push Docker multi-arch manifests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/nhymxu/kith-pms:nightly \
            ghcr.io/nhymxu/kith-pms:nightly-amd64 \
            ghcr.io/nhymxu/kith-pms:nightly-arm64

          docker buildx imagetools create \
            -t ghcr.io/nhymxu/kith-pms:nightly-slim \
            ghcr.io/nhymxu/kith-pms:nightly-slim-amd64 \
            ghcr.io/nhymxu/kith-pms:nightly-slim-arm64

      - name: Delete existing nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create nightly \
            --title "Nightly release" \
            --notes "
          > **Warning**: This is an automated nightly build from the main branch.
          > It may contain bugs and breaking changes. Use at your own risk.
          > For stable releases, please use a versioned release.

          Built from commit: $(git rev-parse --short HEAD)" \
            --prerelease \
            --target "$(git rev-parse HEAD)" \
            dist/*.tar.gz
