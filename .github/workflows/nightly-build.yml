name: Nightly build

on:
  # push:
  #   branches:
  #     - main
  #   paths-ignore:
  #     - '**.md'
  #     - '.github/**'
  #     - '!.github/workflows/nightly-build.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  nightly-build:
    name: GoReleaser-nightly
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: "11"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile --dir web

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing nightly release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Tag current commit as nightly
        run: |
          git tag -f nightly
          git push origin nightly --force

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> 2"
          args: release --skip=validate --parallelism 1 --clean --config .github/.goreleaser-nightly.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
