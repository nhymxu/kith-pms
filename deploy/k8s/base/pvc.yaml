apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kith-data
  namespace: kith-pms
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # No storageClassName — uses cluster default.
  # IMPORTANT: Set reclaimPolicy: Retain on your StorageClass to prevent data loss on PVC deletion.
