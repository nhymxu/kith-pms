apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kith
  namespace: kith-pms
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kith.example.com  # replace with your domain
      secretName: kith-tls
  rules:
    - host: kith.example.com  # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kith
                port:
                  number: 8000
