apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Example overlay — composes base + all optional components.
# Copy and customize for your environment.

bases:
  - ../../base

components:
  - ../../components/ingress
  - ../../components/service-monitor

# Override the image tag for your registry.
images:
  - name: kith-pms
    newName: ghcr.io/nhymxu/kith-pms  # replace with your registry
    newTag: latest
