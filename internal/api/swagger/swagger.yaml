basePath: /v1
definitions:
  github_com_nhymxu_kith-pms_internal_reminders.RecurrenceRule:
    properties:
      day_of_week:
        type: integer
      days_before_dob:
        type: integer
      interval:
        type: integer
      type:
        $ref: '#/definitions/github_com_nhymxu_kith-pms_internal_reminders.RecurrenceType'
      unit:
        type: string
    type: object
  github_com_nhymxu_kith-pms_internal_reminders.RecurrenceType:
    enum:
    - daily
    - weekly
    - monthly
    - yearly
    - custom
    - relative_contact
    - day_of_week
    - birthday
    type: string
    x-enum-varnames:
    - RecurrenceDaily
    - RecurrenceWeekly
    - RecurrenceMonthly
    - RecurrenceYearly
    - RecurrenceCustom
    - RecurrenceRelativeContact
    - RecurrenceDayOfWeek
    - RecurrenceBirthday
  github_com_nhymxu_kith-pms_internal_settings.UserSettings:
    properties:
      allow_favorite_toggle_on_list:
        type: boolean
      audit_log_retention_days:
        description: 0 = disabled
        type: integer
      date_format:
        type: string
      default_people_sort:
        type: string
      favorite_first_default:
        type: boolean
      network_color_by:
        type: string
      network_only_mine_depth:
        description: '"direct" or "alter"'
        type: string
      network_show_avatar:
        type: boolean
      network_show_only_mine:
        type: boolean
      network_show_unconnected:
        type: boolean
      time_format:
        type: string
      timezone:
        type: string
    type: object
  internal_api_handler.contactRequest:
    properties:
      label:
        type: string
      position:
        type: integer
      type:
        type: string
      value:
        type: string
    type: object
  internal_api_handler.datesReplaceRequest:
    properties:
      dates:
        items:
          $ref: '#/definitions/internal_api_handler.importantDateRequest'
        type: array
    type: object
  internal_api_handler.envelope:
    properties:
      data: {}
      error:
        type: string
    type: object
  internal_api_handler.giftRequest:
    properties:
      amount_cents:
        type: integer
      currency:
        type: string
      date:
        type: string
      debt_type:
        type: string
      direction:
        type: string
      notes:
        type: string
      person_id:
        type: integer
      title:
        type: string
    type: object
  internal_api_handler.importantDateRequest:
    properties:
      date_value:
        description: '"YYYY-MM-DD" or "--MM-DD"'
        type: string
      kind:
        type: string
      label:
        type: string
      notes:
        type: string
      position:
        type: integer
      recurring:
        type: boolean
    type: object
  internal_api_handler.journalRequest:
    properties:
      content:
        type: string
      label_ids:
        items:
          type: integer
        type: array
      occurred_at_date:
        description: '"YYYY-MM-DD"'
        type: string
      occurred_at_time:
        description: '"HH:MM" or ""'
        type: string
      person_ids:
        items:
          type: integer
        type: array
      title:
        type: string
    type: object
  internal_api_handler.locationRequest:
    properties:
      address:
        type: string
      city:
        type: string
      country:
        type: string
      position:
        type: integer
      postal_code:
        type: string
      type:
        type: string
    type: object
  internal_api_handler.personRequest:
    properties:
      contacts:
        items:
          $ref: '#/definitions/internal_api_handler.contactRequest'
        type: array
      create_birthday_reminder:
        type: boolean
      date_of_birth:
        description: '"YYYY-MM-DD" or ""'
        type: string
      gender:
        description: '"" | "male" | "female" | "rather_not_say"'
        type: string
      last_contact_at:
        description: RFC3339 UTC or ""
        type: string
      locations:
        items:
          $ref: '#/definitions/internal_api_handler.locationRequest'
        type: array
      name:
        type: string
      nickname:
        type: string
      other_notes:
        type: string
    type: object
  internal_api_handler.reminderRequest:
    properties:
      due_date:
        description: '"YYYY-MM-DD"'
        type: string
      important_date_id:
        type: integer
      notes:
        type: string
      person_id:
        type: integer
      recurrence_end_date:
        type: string
      recurrence_rule:
        $ref: '#/definitions/github_com_nhymxu_kith-pms_internal_reminders.RecurrenceRule'
      title:
        type: string
    type: object
  internal_api_handler.workEntryRequest:
    properties:
      company:
        type: string
      description:
        type: string
      end_date:
        type: string
      location:
        type: string
      position:
        type: integer
      start_date:
        type: string
      title:
        type: string
    type: object
  internal_api_handler.workHistoryReplaceRequest:
    properties:
      entries:
        items:
          $ref: '#/definitions/internal_api_handler.workEntryRequest'
        type: array
    type: object
host: localhost:8000
info:
  contact:
    name: kith
    url: https://github.com/nhymxu/kith-pms
  description: Self-hosted personal relationship manager API.
  license:
    name: MIT
  title: kith API
  version: "1.0"
paths:
  /audit:
    get:
      parameters:
      - description: Filter by entity type
        in: query
        name: entity_type
        type: string
      - description: Filter by entity ID
        in: query
        name: entity_id
        type: integer
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - description: From date YYYY-MM-DD
        in: query
        name: from_date
        type: string
      - description: To date YYYY-MM-DD
        in: query
        name: to_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              data:
                items:
                  type: object
                type: array
              has_more:
                type: boolean
              page:
                type: integer
              page_size:
                type: integer
            type: object
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/internal_api_handler.envelope'
      security:
      - CookieAuth: []
      - CSRFHeader: []
      summary: List audit log entries
      tags:
      - audit
  /audit/cleanup:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              deleted:
                type: integer
            type: object
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/internal_api_handler.envelope'
      security:
      - CookieAuth: []
      - CSRFHeader: []
      summary: Clean up old audit entries
      tags:
      - audit
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with password. Sets kith_session HttpOnly cookie on
        success.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          properties:
            password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_api_handler.envelope'
            - properties:
                data:
                  properties:
                    logged_in:
                      type: boolean
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_handler.envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.envelope'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Revoke current session and clear the session cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_api_handler.envelope'
            - properties:
                data:
                  properties:
                    logged_out:
                      type: boolean
                  type: object
              type: object
      security:
      - CookieAuth: []
      - CSRFHeader: []
      summary: Logout
      tags:
      - auth
  /auth/logout-all:
    post:
      description: Revoke all active sessions and clear the session cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_api_handler.envelope'
            - properties:
                data:
                  properties:
                    logged_out:
                      type: boolean
                  type: object
              type: object
      security:
      - CookieAuth: []
      - CSRFHeader: []
      summary: Logout all sessions
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the authenticated user's ID and creation time.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_api_handler.envelope'
            - properties:
                data:
                  properties:
                    created_at:
                      type: string
                    id:
                      type: integer
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.envelope'
      security:
      - CookieAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/password:
    post:
      consumes:
      - application/json
      description: Change the login password. Revokes all sessions and re-issues a
        new one.
      parameters:
      - description: Password change request
        in: body
        name: body
        required: true
        schema:
          properties:
            confirm_password:
