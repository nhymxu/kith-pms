version: "2"
sql:
  - engine: "sqlite"
    schema:
      - "migrations/*.sql"
    queries:
      - "../*/sql/*.sql"
    gen:
      go:
        package: "queries"
        out: "queries"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
